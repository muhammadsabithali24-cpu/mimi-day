<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mimi 💕</title>

<!-- Calligraphy Font -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #fff0f5);
    overflow: hidden;
    text-align: center;
}

/* Intro */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    padding: 12px 22px;
    border: none;
    background: #ff4d88;
    color: white;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

#countdown {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    justify-content: center;
    align-items: center;
    font-size: 90px;
    color: #ff4d88;
    display: flex;
}

#bigWish {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ffd6e0;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#bigText {
    font-family: 'Great Vibes', cursive;
    font-size: 80px;
    color: #ff4d88;
    animation: pop 1s ease-out, glow 1.5s infinite alternate;
}

@keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff4d88; }
    to { text-shadow: 0 0 30px #ff99bb; }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}

#main {
    display: none;
    padding-top: 60px;
}

#typewriter {
    font-size: 20px;
    width: 80%;
    margin: auto;
    color: #444;
}

.heart {
    position: absolute;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Final Pop */
.finalPop {
    font-family: 'Great Vibes', cursive;
    font-size: 70px;
    color: #ff4d88;
    text-align: center;
    animation: pulseZoom 2s ease-in-out infinite, glow 1.5s infinite alternate;
}

@keyframes pulseZoom {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes popFull {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
}

/* Sparkle orbit animation */
.orbit {
    position: absolute;
    font-size: 20px;
    transform-origin: center center;
    animation: rotateOrbit linear infinite;
}

@keyframes rotateOrbit {
    0% { transform: rotate(0deg) translateX(var(--radius)) rotate(0deg);}
    100% { transform: rotate(360deg) translateX(var(--radius)) rotate(-360deg);}
}
</style>
</head>
<body>

<div id="intro">
    <h2>I made something for you 💌</h2>
    <button onclick="start()">Open 🎁</button>
</div>

<div id="countdown"></div>

<div id="bigWish">
    <div id="bigText">Happy Birthday Mimi 💕</div>
</div>

<div id="main">
    <div id="typewriter"></div>
</div>

<script>
function start() {
    document.getElementById("intro").style.display = "none";
    startCountdown();
}

// Countdown
let num = 5;
function startCountdown() {
    let cd = document.getElementById("countdown");
    cd.style.display = "flex";
    cd.innerHTML = num;

    let interval = setInterval(() => {
        num--;
        cd.innerHTML = num;

        if (num === 0) {
            clearInterval(interval);
            cd.style.display = "none";
            showWish();
        }
    }, 1000);
}

// Show Birthday Wish
function showWish() {
    let wish = document.getElementById("bigWish");
    wish.style.display = "flex";
    createConfetti();

    setTimeout(() => {
        wish.style.display = "none";
        showMain();
    }, 2500);
}

// Confetti effect
function createConfetti() {
    for (let i = 0; i < 80; i++) {
        let conf = document.createElement("div");
        conf.className = "confetti";
        conf.style.left = Math.random() * 100 + "vw";
        conf.style.background = ["#ff4d88","#ffd700","#00c3ff","#7cffcb"][Math.floor(Math.random()*4)];
        document.body.appendChild(conf);
    }
}

// Main message
let mainText = "You are the best thing that happened in my life 🤍\n\nThank you for being with me… always.\n\nI truly pray that all your wishes come true on this beautiful day ✨\n\nI just want to keep celebrating your birthdays with you, again and again 💕";
let finalText = "I pray all your dreams and wishes come true. With love, yours Mu 💝";

let i = 0;
function typeMessage() {
    if (i < mainText.length) {
        document.getElementById("typewriter").innerHTML += mainText.charAt(i);
        i++;
        setTimeout(typeMessage, 50);
    } else {
        setTimeout(showFinalPop, 500);
    }
}

// Final pop with orbiting sparkles
function showFinalPop() {
    let pop = document.createElement("div");
    pop.style.position = "fixed";
    pop.style.top = "0";
    pop.style.left = "0";
    pop.style.width = "100%";
    pop.style.height = "100%";
    pop.style.background = "radial-gradient(circle, #fff0f5, #ffd6e0)";
    pop.style.display = "flex";
    pop.style.justifyContent = "center";
    pop.style.alignItems = "center";
    pop.style.flexDirection = "column";
    pop.style.zIndex = "9999";

    let textEl = document.createElement("div");
    textEl.className = "finalPop";
    textEl.innerHTML = finalText;
    pop.appendChild(textEl);
    document.body.appendChild(pop);

    createConfetti();
    floating();

    // Add orbiting sparkles
    for (let j=0;j<20;j++){
        let sparkle = document.createElement("div");
        sparkle.className = "orbit";
        sparkle.innerHTML = ["✨","💖","🌸","💫"][Math.floor(Math.random()*4)];
        sparkle.style.top = "50%";
        sparkle.style.left = "50%";
        let radius = 50 + Math.random()*50; // radius in px
        sparkle.style.setProperty('--radius', radius + 'px');
        sparkle.style.animationDuration = (2 + Math.random()*2) + "s";
        pop.appendChild(sparkle);
    }

    setTimeout(() => { pop.remove(); }, 6000);
}

// Floating hearts animation
function floating() {
    setInterval(() => {
        let el = document.createElement("div");
        el.className = "heart";
        el.innerHTML = ["💖","🦋","✨","🌸"][Math.floor(Math.random()*4)];
        el.style.left = Math.random()*100 + "vw";
        el.style.fontSize = "25px";
        el.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(el);
    }, 400);
}

function showMain() {
    document.getElementById("main").style.display = "block";
    typeMessage();
    floating();
}
</script>

</body>
</html>
